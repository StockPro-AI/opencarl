name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run docs:ci

      - name: Build guides and tutorials
        run: node scripts/build-docs.js

      - name: Verify docs directory
        run: |
          echo "=== Docs directory contents ==="
          ls -la docs/
          echo "=== HTML files ==="
          find docs -name "*.html" | head -20
          echo "=== Total file count ==="
          find docs -type f | wc -l

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
