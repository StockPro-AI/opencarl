name: OpenCARL Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Skip draft PRs (per user decision)
    types: [opened, synchronize, reopened, ready_for_review]

# Only run on non-draft PRs
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'release' && github.event.pull_request.draft != true
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true
          OPENCARL_DEBUG: "false"
      
      - name: Upload coverage report (OpenCARL)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: opencarl-coverage-report
          path: coverage/lcov-report/
          retention-days: 30
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
